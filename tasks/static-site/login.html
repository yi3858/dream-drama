<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>登录 - 漫绘星球</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="auth-page">
  <!-- 背景光晕 -->
  <div class="hero-glow" style="top:20%;left:15%;width:20rem;height:20rem;background:rgba(139,92,246,.15);"></div>
  <div class="hero-glow" style="bottom:20%;right:15%;width:18rem;height:18rem;background:rgba(34,211,238,.1);"></div>

  <div class="auth-card">
    <!-- Logo -->
    <div style="text-align:center;margin-bottom:2rem;">
      <a href="index.html" style="display:inline-flex;align-items:center;gap:.65rem;text-decoration:none;">
        <div class="logo-icon" style="width:2.75rem;height:2.75rem;border-radius:.75rem;">✨</div>
        <span class="logo-text" style="font-size:1.5rem;">漫绘星球</span>
      </a>
      <p class="text-muted" style="font-size:.875rem;margin-top:.5rem;">AI漫剧制作聚合平台</p>
    </div>

    <h2 style="font-size:1.25rem;font-weight:700;margin-bottom:.35rem;text-align:center;">欢迎回来</h2>
    <p class="text-muted" style="font-size:.875rem;text-align:center;margin-bottom:1.75rem;">登录你的漫绘星球账户</p>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">👤 用户名</label>
        <input type="text" class="form-input" id="username" placeholder="请输入用户名" required autocomplete="username"/>
      </div>
      <div class="form-group" style="position:relative;">
        <label class="form-label">🔒 密码</label>
        <input type="password" class="form-input" id="password" placeholder="请输入密码" required autocomplete="current-password" style="padding-right:2.75rem;"/>
        <button type="button" onclick="togglePwd('password','eyeLogin')" style="position:absolute;right:.75rem;bottom:.7rem;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;" id="eyeLogin">👁</button>
      </div>

      <div id="loginError" style="display:none;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:.5rem;padding:.65rem .85rem;font-size:.8rem;color:#fca5a5;margin-bottom:1rem;">
        ⚠️ 用户名或密码错误，请重试
      </div>

      <button type="submit" class="submit-btn" id="loginBtn">登录</button>
    </form>

    <!-- 分割线 -->
    <div style="display:flex;align-items:center;gap:.75rem;margin:1.25rem 0;">
      <div style="flex:1;height:1px;background:var(--border);"></div>
      <span style="font-size:.75rem;color:var(--text-dim);">或</span>
      <div style="flex:1;height:1px;background:var(--border);"></div>
    </div>

    <!-- 微信登录（展示） -->
    <button style="width:100%;padding:.75rem;border-radius:.625rem;background:transparent;border:1px solid var(--border-light);color:#e2e8f0;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem;transition:background .2s;" onmouseover="this.style.background='rgba(255,255,255,.05)'" onmouseout="this.style.background='transparent'" onclick="alert('请使用手机扫码登录，功能即将上线！')">
      💚 微信扫码登录
    </button>

    <div class="auth-link">
      还没有账号？<a href="register.html">免费注册</a>
    </div>
    <div class="auth-link" style="margin-top:.5rem;">
      <a href="#" style="color:var(--text-dim);">忘记密码？</a>
    </div>
  </div>
</div>

<script>
function togglePwd(inputId,btnId){
  const inp=document.getElementById(inputId);
  inp.type=inp.type==='password'?'text':'password';
}

function handleLogin(e){
  e.preventDefault();
  const btn=document.getElementById('loginBtn');
  const err=document.getElementById('loginError');
  const user=document.getElementById('username').value.trim();
  const pwd=document.getElementById('password').value;
  btn.textContent='登录中...';
  btn.disabled=true;
  err.style.display='none';

  // 模拟登录请求
  setTimeout(()=>{
    // 演示：任何非空用户名/密码都提示成功（实际需对接后端）
    if(user&&pwd.length>=6){
      btn.textContent='✓ 登录成功，跳转中...';
      setTimeout(()=>{window.location.href='index.html';},800);
    } else {
      err.style.display='';
      err.textContent=pwd.length<6?'⚠️ 密码至少6位':'⚠️ 请填写用户名和密码';
      btn.textContent='登录';
      btn.disabled=false;
    }
  },900);
}
</script>
</body>
</html>
