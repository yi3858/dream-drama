# ============================================
# AI漫剧制作平台 - 原生 Nginx 配置
# 适用于直接安装在 Linux 服务器上的 Nginx
# 文件路径: /etc/nginx/conf.d/ai-manga.conf
# ============================================

server {
    listen 80;

    # ⚠️ 将下方替换为你的域名或服务器 IP
    server_name 47.96.126.77;

    # ⚠️ 将下方替换为你的 dist 目录实际路径
    root /www/wwwroot/ai-manga/dist;
    index index.html;

    # ---- 日志 ----
    access_log  /var/log/nginx/ai-manga.access.log;
    error_log   /var/log/nginx/ai-manga.error.log;

    # ---- gzip 压缩 ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1k;
    gzip_types
        text/plain text/css text/xml
        application/json application/javascript
        application/xml+rss image/svg+xml
        font/ttf font/otf font/woff font/woff2;

    # ---- index.html 不缓存（SPA 入口必须禁用缓存）----
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ---- 静态资源长期缓存（Vite 构建文件名含 hash）----
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|webp|mp4|webm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    # ---- ✅ SPA 路由回退（解决刷新 /admin 等页面 404）----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- 安全响应头 ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

