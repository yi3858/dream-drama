<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>我的任务 - AI视频生成平台</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .task-detail-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      flex-wrap: wrap; gap: 12px; margin-bottom: 20px;
    }
    .param-pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .param-pill  {
      font-size: .78rem; padding: 3px 10px;
      background: var(--slate-100); color: var(--slate-600);
      border-radius: 9999px; border: 1px solid var(--slate-200);
    }
    .tab-bar {
      display: flex; gap: 0;
      border-bottom: 2px solid var(--slate-200);
      margin-bottom: 20px;
    }
    .tab-item {
      padding: 10px 20px; font-size: .9rem; font-weight: 500;
      color: var(--slate-500); cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -2px;
      white-space: nowrap; transition: all .15s;
    }
    .tab-item:hover  { color: var(--primary); }
    .tab-item.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }
    .history-table   { width: 100%; border-collapse: collapse; }
    .history-table th, .history-table td {
      padding: 11px 14px; text-align: left; font-size: .875rem;
      border-bottom: 1px solid var(--slate-200);
      white-space: nowrap;
    }
    .history-table th { color: var(--slate-500); font-weight: 600; background: var(--slate-50); }
    .history-table td:first-child { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .history-table tr:hover td { background: var(--slate-50); }
    .history-table tr:last-child td { border-bottom: none; }
    @media (max-width: 767px) {
      .history-table { display: none; }
      .mobile-task-list { display: flex; flex-direction: column; gap: 10px; }
    }
    @media (min-width: 768px) {
      .mobile-task-list { display: none; }
    }
  </style>
</head>
<body>

<!-- 导航 -->
<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="logo"><div class="logo-icon">▶</div><span>AI视频生成</span></a>
    <div class="nav-links">
      <a href="index.html"   class="nav-link">首页</a>
      <a href="submit.html"  class="nav-link">生成视频</a>
      <a href="result.html"  class="nav-link active">我的任务</a>
      <a href="profile.html" class="nav-link">个人中心</a>
    </div>
    <div class="nav-actions">
      <a href="profile.html" class="nav-user">
        <div class="avatar">张</div><span>我的账户</span>
      </a>
    </div>
    <button class="hamburger" onclick="toggleMenu()" aria-label="菜单"><span></span><span></span><span></span></button>
  </div>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <a href="index.html"   class="nav-link" onclick="closeMenu()">首页</a>
  <a href="submit.html"  class="nav-link" onclick="closeMenu()">生成视频</a>
  <a href="result.html"  class="nav-link active" onclick="closeMenu()">我的任务</a>
  <a href="profile.html" class="nav-link" onclick="closeMenu()">个人中心</a>
</div>

<main class="page-main">
  <div class="container">

    <div class="page-header" style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px;">
      <div>
        <h1 class="page-title">我的任务</h1>
        <p class="page-subtitle">查看所有视频生成任务的进度与结果</p>
      </div>
      <a href="submit.html" class="btn btn-primary">+ 新建生成任务</a>
    </div>

    <!-- 当前正在处理的任务 -->
    <div id="activeTaskWrap" style="margin-bottom:24px;display:none;">
      <div class="status-card" id="activeCard">
        <div class="task-detail-header">
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px;">
              <span class="badge badge-amber" id="statusBadge">⏳ 处理中</span>
              <span class="text-sm text-muted" id="activeTaskId">任务 ID: —</span>
            </div>
            <p style="font-size:.9375rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" id="activePrompt">—</p>
            <div class="param-pills mt-2" id="activeParams"></div>
          </div>
          <div style="flex-shrink:0;text-align:right;">
            <div class="text-xs text-muted">预计剩余</div>
            <div style="font-size:1.25rem;font-weight:700;color:var(--primary);" id="remainTime">—</div>
          </div>
        </div>

        <!-- 进度条 -->
        <div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
            <span style="font-size:.875rem;font-weight:600;" id="stageName">排队等待中…</span>
            <span style="font-size:.875rem;font-weight:700;color:var(--primary);" id="progressPct">0%</span>
          </div>
          <div class="progress-wrap progress-lg">
            <div class="progress-bar" id="progressBar" style="width:0%"></div>
          </div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:10px;" id="stageRow"></div>
        </div>

        <!-- 完成后显示视频 -->
        <div id="videoSection" style="display:none;margin-top:16px;">
          <hr class="divider"/>
          <h4 style="font-weight:700;margin-bottom:12px;">🎬 生成完毕，立即播放</h4>
          <div class="video-wrap">
            <!-- 真实部署时替换为实际视频 URL -->
            <video id="resultVideo" class="video-player" controls preload="metadata" poster="">
              <source src="" type="video/mp4"/>
              你的浏览器不支持视频播放，请下载后观看。
            </video>
          </div>
          <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;">
            <a class="btn btn-primary" id="downloadBtn" href="#" download>⬇ 下载视频</a>
            <button class="btn btn-ghost" onclick="reSubmit()">↺ 重新生成</button>
            <button class="btn btn-ghost" onclick="shareTask()">⎘ 分享任务</button>
          </div>
        </div>

        <!-- 失败状态 -->
        <div id="errorSection" style="display:none;margin-top:16px;">
          <div style="background:var(--red-l);border:1px solid #FECACA;border-radius:var(--radius);padding:14px 16px;">
            <p style="font-weight:600;color:#991B1B;margin-bottom:4px;">❌ 生成失败</p>
            <p style="font-size:.875rem;color:#B91C1C;" id="errorMsg">模型服务暂时不可用，请稍后重试。</p>
            <p style="font-size:.8rem;color:#B91C1C;margin-top:6px;">✅ 已全额退还 <strong id="refundAmt"></strong> 积分至你的账户</p>
          </div>
          <button class="btn btn-primary mt-3" onclick="reSubmit()">↺ 重新提交</button>
        </div>
      </div>
    </div>

    <!-- 任务历史 -->
    <div class="card" style="padding:0;overflow:hidden;">
      <div style="padding:16px 20px;border-bottom:1px solid var(--slate-200);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
        <div class="tab-bar" style="margin-bottom:0;border-bottom:none;">
          <div class="tab-item active" onclick="filterTasks('all',this)">全部</div>
          <div class="tab-item" onclick="filterTasks('done',this)">已完成</div>
          <div class="tab-item" onclick="filterTasks('processing',this)">处理中</div>
          <div class="tab-item" onclick="filterTasks('failed',this)">失败</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="clearHistory()" style="color:var(--red);">清空记录</button>
      </div>

      <!-- PC 表格 -->
      <div style="overflow-x:auto;">
        <table class="history-table">
          <thead>
            <tr><th>提示词</th><th>分辨率</th><th>时长</th><th>积分</th><th>状态</th><th>时间</th><th>操作</th></tr>
          </thead>
          <tbody id="historyTbody"></tbody>
        </table>
      </div>

      <!-- 移动端卡片列表 -->
      <div class="mobile-task-list" id="mobileTasks" style="padding:12px;"></div>

      <!-- 空状态 -->
      <div class="empty-state" id="emptyState" style="display:none;">
        <div class="icon">📋</div>
        <p>暂无任务记录</p>
        <a href="submit.html" class="btn btn-primary btn-sm">立即生成视频</a>
      </div>
    </div>

  </div>
</main>

<footer>
  <div class="container">
    <div class="footer-inner">
      <div class="footer-copy">© 2026 AI视频生成平台</div>
      <div class="footer-links"><a href="#">联系我们</a></div>
    </div>
  </div>
</footer>

<div class="toast-container" id="toastContainer"></div>

<script>
function toggleMenu(){const m=document.getElementById('mobileMenu');m.classList.toggle('open');document.body.style.overflow=m.classList.contains('open')?'hidden':'';}
function closeMenu(){document.getElementById('mobileMenu').classList.remove('open');document.body.style.overflow='';}

// ===== 模拟数据 =====
const DEMO_TASKS=[
  {id:'TDEMO1',prompt:'宇宙星云爆炸，粒子飞散，科幻感十足，电影级画质，4K超清',res:'4k',dur:'10',cost:648,status:'done',progress:100,videoUrl:'',createdAt:new Date(Date.now()-3600000*2).toISOString()},
  {id:'TDEMO2',prompt:'日落时分海边的白色帆船缓缓驶入港口，海鸥飞翔，温暖色调',res:'1080p',dur:'15',cost:225,status:'done',progress:100,videoUrl:'',createdAt:new Date(Date.now()-3600000*5).toISOString()},
  {id:'TDEMO3',prompt:'城市霓虹夜景，赛博朋克风格，雨后积水映出光影',res:'1080p',dur:'5',cost:90,status:'failed',progress:0,videoUrl:'',createdAt:new Date(Date.now()-3600000*8).toISOString()},
];

function getTasks(){
  let tasks=JSON.parse(localStorage.getItem('ai_tasks')||'[]');
  if(!tasks.length){localStorage.setItem('ai_tasks',JSON.stringify(DEMO_TASKS));tasks=DEMO_TASKS;}
  return tasks;
}
function saveTasks(t){localStorage.setItem('ai_tasks',JSON.stringify(t));}

// ===== 当前任务（进度模拟）=====
const STAGES=[
  {name:'排队等待',pct:8},
  {name:'解析提示词',pct:22},
  {name:'生成关键帧',pct:55},
  {name:'视频合成',pct:82},
  {name:'后处理与压缩',pct:98},
  {name:'生成完毕',pct:100},
];

let activeTask=null;
let progressTimer=null;
let currentStageIdx=0;
let currentPct=0;

function initActiveTask(){
  const params=new URLSearchParams(location.search);
  const tid=params.get('id');
  const tasks=getTasks();

  // 优先显示 URL 参数指定的任务
  let task=tid?tasks.find(t=>t.id===tid):null;
  if(!task) task=tasks.find(t=>t.status==='processing');
  if(!task) return;

  activeTask=task;
  document.getElementById('activeTaskWrap').style.display='';
  document.getElementById('activeTaskId').textContent='任务 ID: '+task.id;
  document.getElementById('activePrompt').textContent=task.prompt;
  document.getElementById('activeParams').innerHTML=[
    '<span class="param-pill">'+task.res.toUpperCase()+'</span>',
    '<span class="param-pill">'+task.dur+'秒</span>',
    '<span class="param-pill">'+task.cost+'积分</span>',
  ].join('');

  // 生成阶段指示器
  document.getElementById('stageRow').innerHTML=STAGES.slice(0,5).map((s,i)=>`
    <div style="text-align:center;">
      <div style="width:8px;height:8px;border-radius:9999px;background:var(--slate-200);margin:0 auto 4px;" id="dot-${i}"></div>
      <div style="font-size:.65rem;color:var(--slate-400);">${s.name}</div>
    </div>
  `).join('');

  if(task.status==='done'){
    showDone(task);
  } else if(task.status==='failed'){
    showError(task);
  } else {
    simulateProgress(task);
  }
}

function simulateProgress(task){
  document.getElementById('progressBar').style.width='0%';
  document.getElementById('progressPct').textContent='0%';
  document.getElementById('remainTime').textContent='~90s';
  document.getElementById('statusBadge').innerHTML='⏳ 处理中';
  document.getElementById('statusBadge').className='badge badge-amber';

  currentPct=0; currentStageIdx=0;
  const totalTime=6000; // 模拟6秒完成
  const interval=80;

  progressTimer=setInterval(()=>{
    currentPct=Math.min(100,currentPct+Math.random()*2.2+0.4);
    document.getElementById('progressBar').style.width=currentPct.toFixed(1)+'%';
    document.getElementById('progressPct').textContent=Math.floor(currentPct)+'%';

    const stage=STAGES.find(s=>currentPct<=s.pct)||STAGES[STAGES.length-1];
    const si=STAGES.indexOf(stage);
    document.getElementById('stageName').textContent=stage.name+'…';
    document.getElementById('remainTime').textContent=
      currentPct<100?Math.max(0,Math.round((100-currentPct)/1.8))+'s':'完成';

    // 更新阶段点颜色
    for(let i=0;i<5;i++){
      const dot=document.getElementById('dot-'+i);
      if(!dot)continue;
      if(i<si) dot.style.background='var(--green)';
      else if(i===si) dot.style.background='var(--primary)';
      else dot.style.background='var(--slate-200)';
    }

    if(currentPct>=100){
      clearInterval(progressTimer);
      // 更新任务状态
      const tasks=getTasks();
      const idx=tasks.findIndex(t=>t.id===task.id);
      if(idx>-1){tasks[idx].status='done';tasks[idx].progress=100;saveTasks(tasks);}
      task.status='done';
      document.getElementById('statusBadge').innerHTML='✅ 已完成';
      document.getElementById('statusBadge').className='badge badge-green';
      document.getElementById('stageName').textContent='生成完毕';
      showDone(task);
      renderHistory('all');
    }
  },interval);
}

function showDone(task){
  document.getElementById('videoSection').style.display='';
  document.getElementById('errorSection').style.display='none';
  document.getElementById('statusBadge').innerHTML='✅ 已完成';
  document.getElementById('statusBadge').className='badge badge-green';
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressPct').textContent='100%';
  document.getElementById('stageName').textContent='生成完毕 🎉';
  document.getElementById('remainTime').textContent='0s';
  document.getElementById('activeCard').classList.add('done');
  // 示例视频（实际替换为真实URL）
  const v=document.getElementById('resultVideo');
  if(task.videoUrl){v.src=task.videoUrl;v.load();}
  document.getElementById('downloadBtn').href=task.videoUrl||'#';
}

function showError(task){
  document.getElementById('videoSection').style.display='none';
  document.getElementById('errorSection').style.display='';
  document.getElementById('statusBadge').innerHTML='❌ 失败';
  document.getElementById('statusBadge').className='badge badge-red';
  document.getElementById('activeCard').classList.add('error');
  document.getElementById('refundAmt').textContent=task.cost+' 积分';
}

// ===== 历史列表 =====
let currentFilter='all';
function filterTasks(f,el){
  currentFilter=f;
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderHistory(f);
}

const STATUS_MAP={
  processing:{badge:'badge-amber',text:'⏳ 处理中'},
  done:{badge:'badge-green',text:'✅ 已完成'},
  failed:{badge:'badge-red',text:'❌ 失败'},
};

function renderHistory(f){
  const tasks=getTasks();
  const filtered=f==='all'?tasks:tasks.filter(t=>t.status===f);
  const empty=document.getElementById('emptyState');

  if(!filtered.length){
    empty.style.display='';
    document.getElementById('historyTbody').innerHTML='';
    document.getElementById('mobileTasks').innerHTML='';
    return;
  }
  empty.style.display='none';

  // PC 表格
  document.getElementById('historyTbody').innerHTML=filtered.map(t=>{
    const st=STATUS_MAP[t.status]||STATUS_MAP.failed;
    const d=new Date(t.createdAt);
    const timeStr=d.getMonth()+1+'/'+(d.getDate())+' '+(d.getHours()<10?'0':'')+d.getHours()+':'+(d.getMinutes()<10?'0':'')+d.getMinutes();
    return `<tr>
      <td title="${t.prompt}">${t.prompt.length>40?t.prompt.substring(0,40)+'…':t.prompt}</td>
      <td>${t.res.toUpperCase()}</td>
      <td>${t.dur}秒</td>
      <td>-${t.cost}</td>
      <td><span class="badge ${st.badge}">${st.text}</span></td>
      <td>${timeStr}</td>
      <td>
        ${t.status==='done'?`<a href="${t.videoUrl||'#'}" class="btn btn-outline btn-sm" ${t.videoUrl?'download':''} style="font-size:.75rem;padding:4px 10px;">下载</a>`:''}
        <button onclick="viewTask('${t.id}')" class="btn btn-ghost btn-sm" style="font-size:.75rem;padding:4px 10px;">详情</button>
      </td>
    </tr>`;
  }).join('');

  // 移动端卡片
  document.getElementById('mobileTasks').innerHTML=filtered.map(t=>{
    const st=STATUS_MAP[t.status]||STATUS_MAP.failed;
    return `<div class="task-item" onclick="viewTask('${t.id}')">
      <div class="task-icon">${t.status==='done'?'🎬':t.status==='failed'?'❌':'⏳'}</div>
      <div class="task-body">
        <div class="task-title">${t.prompt}</div>
        <div class="task-meta">${t.res.toUpperCase()} · ${t.dur}秒 · ${t.cost}积分</div>
        <div style="margin-top:4px;"><span class="badge ${st.badge}" style="font-size:.72rem;">${st.text}</span></div>
      </div>
    </div>`;
  }).join('');
}

function viewTask(id){
  location.href='result.html?id='+id;
}

function reSubmit(){
  if(activeTask){
    const p=encodeURIComponent(activeTask.prompt);
    location.href='submit.html';
  }
}

function shareTask(){
  if(navigator.share){
    navigator.share({title:'AI视频生成',text:'我用AI生成了一个视频！',url:location.href});
  } else {
    navigator.clipboard.writeText(location.href).then(()=>showToast('链接已复制'));
  }
}

function clearHistory(){
  if(!confirm('确定清空所有任务记录？'))return;
  localStorage.removeItem('ai_tasks');
  renderHistory('all');
  showToast('已清空');
}

function showToast(msg,type=''){
  const c=document.getElementById('toastContainer');
  const t=document.createElement('div');
  t.className='toast'+(type?' toast-'+type:'');
  t.textContent=msg;
  c.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

// 初始化
initActiveTask();
renderHistory('all');
</script>
</body>
</html>
